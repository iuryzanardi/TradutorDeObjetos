<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Escolar com QR Code</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex flex-col justify-between h-screen overflow-hidden">

    <header class="p-4 bg-gray-800 text-center shadow-md z-10">
        <label for="idioma" class="block text-sm font-medium mb-1">Idioma do Guia:</label>
        <select id="idioma" class="bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-600 focus:outline-none w-full max-w-xs">
            <option value="pt">Português 🇧🇷</option>
            <option value="es">Español 🇪🇸</option>
            <option value="fr">Français 🇫🇷</option>
            <option value="de">Deutsch 🇩🇪</option>
            <option value="en">English 🇺🇸</option>
        </select>
    </header>

    <main class="relative flex-1 flex flex-col items-center justify-center bg-black p-4">
        <div id="reader" class="w-full max-w-sm rounded-lg overflow-hidden border-2 border-dashed border-gray-500"></div>
        
        <div id="status" class="mt-2 text-sm text-gray-400 animate-pulse">
            Aponte para um QR Code da escola...
        </div>
    </main>

    <footer class="p-6 bg-gray-800 rounded-t-2xl text-center shadow-lg flex flex-col items-center justify-center min-h-[200px] z-10">
        <div class="text-xs text-gray-400 uppercase tracking-wider">Local Detectado</div>
        <div id="local-original" class="text-xl font-semibold text-gray-300 mt-1">-</div>
        <div id="resultado-traducao" class="text-2xl font-bold my-2 text-green-400">Escaneie um local</div>
        
        <button id="btn-ouvir" class="mt-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-700 disabled:opacity-50 text-white px-6 py-3 rounded-full font-medium transition flex items-center gap-2 shadow-md" disabled>
            🔊 Ouvir Explicação
        </button>
    </footer>

    <script>
        const resultadoTraducao = document.getElementById('resultado-traducao');
        const localOriginal = document.getElementById('local-original');
        const btnOuvir = document.getElementById('btn-ouvir');
        const seletorIdioma = document.getElementById('idioma');
        const statusDiv = document.getElementById('status');

        let localAtual = "";
        let html5QrcodeScanner = null;
        let audioCustomizado = null;

        // Base de dados de explicações padrão (para a IA ler nos outros idiomas)
        const explicacoes = {
            "biblioteca": "Este é o espaço de leitura e estudos da escola. Aqui você encontra livros, enciclopédias e computadores para pesquisa.",
            "corredor": "Este corredor conecta as salas de aula principais ao bloco administrativo. Mantenha o silêncio durante o horário de aulas.",
            "laboratorio": "Laboratório de ciências e informática. Utilizado para aulas práticas e experimentos supervisionados.",
            "refeitorio": "Área de convivência e alimentação dos estudantes. O almoço e os lanches são servidos nos horários de intervalo."
        };

        // 1. Inicializa o Scanner de QR Code
        function iniciarScanner() {
            // Configura o scanner para usar a câmera traseira (environment)
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            const config = { 
                fps: 10, // Quadros por segundo para leitura
                qrbox: { width: 250, height: 250 } // Tamanho do quadrado de leitura na tela
            };

            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                statusDiv.innerText = "Erro ao acessar câmera: " + err;
            });
        }

        // 2. Executado quando um QR Code é lido com sucesso
        function onScanSuccess(decodedText, decodedResult) {
            // Transforma o texto em minúsculo para evitar erros (ex: "Biblioteca" vira "biblioteca")
            const palavraChave = decodedText.toLowerCase().trim();

            // Só processa se for um QR Code novo e válido na nossa lista
            if (palavraChave !== localAtual && explicacoes[palavraChave]) {
                localAtual = palavraChave;
                localOriginal.innerText = `ID: ${decodedText}`;
                
                // Para o áudio anterior caso estivesse tocando
                pararAudios();

                // Dispara a tradução da explicação do local
                traduzirEPrepararGuia(palavraChave);
            }
        }

        function onScanFailure(error) {
            // Ignora falhas de leitura contínuas (comum enquanto procura o QR code)
        }

        // 3. Traduz a explicação para o idioma selecionado
        async function traduzirEPreparaGuia(palavra) {
            const idiomaDestino = seletorIdioma.value;
            const textoOriginal = explicacoes[palavra];

            resultadoTraducao.innerText = "Traduzindo guia...";
            btnOuvir.disabled = true;

            // Se for português, não precisa chamar API de tradução
            if (idiomaDestino === 'pt') {
                resultadoTraducao.innerText = textoOriginal;
                btnOuvir.disabled = false;
                return;
            }

            try {
                // Traduz o bloco de texto explicativo inteiro de uma vez
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(textoOriginal)}&langpair=pt|${idiomaDestino}`;
                const resposta = await fetch(url);
                const dados = await resposta.json();
                
                if (dados.responseData && dados.responseData.translatedText) {
                    resultadoTraducao.innerText = dados.responseData.translatedText;
                    btnOuvir.disabled = false;
                } else {
                    resultadoTraducao.innerText = "Erro ao traduzir explicação.";
                }
            } catch (error) {
                console.error(error);
                resultadoTraducao.innerText = textoOriginal; // Fallback
                btnOuvir.disabled = false;
            }
        }

        // 4. Lógica de Áudio (Customizado para Espanhol vs IA para outros)
        function gerenciarAudio() {
            const idioma = seletorIdioma.value;

            // Para qualquer áudio que já esteja tocando antes de começar o novo
            pararAudios();

            if (idioma === 'es') {
                // Cenário: ESPANHOL -> Toca o arquivo MP3 personalizado
                // O nome do arquivo deve ser exatamente igual ao ID do QR code (ex: biblioteca.mp3, corredor.mp3)
                audioCustomizado = new Audio(`audios/${localAtual}.mp3`);
                
                statusDiv.innerText = "Tocando áudio gravado em Espanhol...";
                audioCustomizado.play().catch(err => {
                    statusDiv.innerText = "Erro: Arquivo mp3 correspondente não foi encontrado.";
                    // Se o mp3 falhar/não existir, usa a IA de espanhol como plano B
                    falarComIA(resultadoTraducao.innerText, 'es-ES');
                });

                audioCustomizado.onended = () => { statusDiv.innerText = "Áudio concluído."; };

            } else {
                // Cenário: OUTRAS LÍNGUAS -> Usa a voz nativa do celular
                const codigosLocais = { pt: 'pt-BR', en: 'en-US', fr: 'fr-FR', de: 'de-DE' };
                const sotaque = codigosLocais[idioma] || idioma;
                
                falarComIA(resultadoTraducao.innerText, sotaque);
            }
        }

        // Função auxiliar para tocar a voz de IA do navegador
        function falarComIA(texto, sotaque) {
            statusDiv.innerText = "Reproduzindo voz de IA...";
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = sotaque;
            utterance.onend = () => { statusDiv.innerText = "Áudio concluído."; };
            window.speechSynthesis.speak(utterance);
        }

        function pararAudios() {
            if (audioCustomizado) {
                audioCustomizado.pause();
                audioCustomizado = null;
            }
            window.speechSynthesis.cancel();
        }

        // Eventos
        btnOuvir.addEventListener('click', gerenciarAudio);
        seletorIdioma.addEventListener('change', () => {
            if (localAtual) traduzirEPrepararGuia(localAtual);
        });

        // Inicialização automática ao carregar a página
        window.addEventListener('DOMContentLoaded', iniciarScanner);
    </script>
</body>
</html>
